<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Local-first PWA threat model: XSS = full read/write of OPFS SQLite DB.
      - 'wasm-unsafe-eval' required by @sqlite.org/sqlite-wasm
      - 'unsafe-inline' on style-src kept for Tailwind dynamic styles & runtime CSS vars
      - worker-src blob: required by vite-plugin-pwa service worker registration
      - object-src/base-uri/frame-ancestors locked down (no plugins, no <base> hijack, no embedding)
      Mirror any change in vite.config.ts (preview server) and public/_headers (production).
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Training" />
    <title>Training Log</title>
  </head>

    <div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#09090b;color:#3f3f46;font-family:monospace;font-size:0.75rem;letter-spacing:0.1em">LOADING…</div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
