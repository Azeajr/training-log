name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '!src/**/*.test.*'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'tsconfig*'

# Least-privilege GITHUB_TOKEN: deploy needs no repo writes.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      # TODO: switch back to `npm ci` once npm resolves the lock-file bug:
      # @rolldown/binding-wasm32-wasi (cpu:wasm32) lists @emnapi/core + @emnapi/runtime
      # as deps, but npm 11 omits them from the lock file because the cpu-filtered
      # optional package is never installed locally. `npm ci` then fails with
      # "Missing: @emnapi/core@1.10.0 from lock file". Track: https://github.com/npm/cli/issues
      #
      # Until then: prefer the lockfile (`--prefer-offline`, `--no-audit`,
      # `--no-fund`) so we still get reproducible installs in CI, and verify
      # registry signatures so a tampered lockfile is caught before deploy.
      - run: npm install --prefer-offline --no-audit --no-fund
      - run: npm audit signatures

      - run: npm run build

      - name: Create project if missing
        run: npx wrangler pages project create 531-log --production-branch main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 5141f0dec18e8fb0aa0942a9f09f982d

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name 531-log
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 5141f0dec18e8fb0aa0942a9f09f982d
