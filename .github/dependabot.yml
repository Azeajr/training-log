# Weekly dependency security updates. Keeps the supply-chain attack window
# small without flooding the inbox.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Bundle non-security minor/patch bumps into a single PR per ecosystem.
      # Security advisories still open their own PR.
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
